<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Poems | Hasinova</title>

  <link rel="stylesheet" href="../assets/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-light: #f5efff;   /* lavender */
      --bg-mid: #efe7fb;     /* lilac */
      --bg-warm: #fff3f8;    /* soft pink */

      --text-main: #2d2d2d;
      --muted: #7a6f8a;
      --accent: #a084ca;
    }

    html, body { height: 100%; margin:0; }

    body {
      font-family:"Poppins",system-ui;

      background:
        linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px),
        linear-gradient(180deg, var(--bg-light), var(--bg-mid), var(--bg-warm));

      background-size: 28px 28px, 28px 28px, cover;

      color: var(--text-main);
      min-height:100vh;
      padding:32px 20px;

      display:flex;
      flex-direction:column;
      align-items:center;
      overflow-x:hidden;
    }

    .container { width:100%; max-width:1100px; }

    header {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:30px;
    }

    .logo a{
      text-decoration:none;
      color:#2d2d2d;
      font-weight:700;
      font-size:1.2rem;
    }

    nav ul {
      display:flex;
      list-style:none;
      margin:0;
      padding:0;
      gap:16px;
    }

    nav a {
      color: var(--muted);
      text-decoration:none;
      font-weight:600;
    }

    nav a.active, nav a:hover {
      color: #2d2d2d;
    }

    h2 {
      margin-bottom:24px;
      font-size:1.9rem;
      font-weight:600;
    }

    .cards {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:24px;
      width:100%;
    }

    /* 💜 cards */
    .card {
      background: rgba(255,255,255,0.75);
      border: 1px solid rgba(0,0,0,0.05);
      border-radius:16px;
      overflow:hidden;

      box-shadow: 0 10px 25px rgba(0,0,0,0.08);

      transition: transform .25s ease, box-shadow .25s ease;

      display:flex;
      flex-direction:column;
      min-height:260px;
    }

    .card:hover {
      transform:translateY(-8px);
      box-shadow:0 18px 40px rgba(160,132,202,0.25);
    }

    .thumb {
      width:100%;
      height:150px;
      object-fit:cover;
      filter: brightness(0.95) saturate(0.95);
    }

    .card-body {
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:10px;
      flex:1;
    }

    .card h3 {
      margin:0;
      font-size:1.1rem;
    }

    .card h3 a {
      color: var(--text-main);
      text-decoration:none;
    }

    .card h3 a:hover { text-decoration:underline; }

    .excerpt {
      color:var(--muted);
      font-size:0.92rem;
      line-height:1.5;
      flex:1;
    }

    .meta {
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:0.8rem;
      margin-top:12px;
    }

    .cat {
      padding:4px 10px;
      border-radius:20px;

      background: rgba(160,132,202,0.15);
      color: #6d5ba6;

      font-weight:500;
    }

    .date {
      color: var(--muted);
    }

    .notice {
      display:none;
      padding:20px;
      color:var(--muted);
      text-align:center;
    }

    /* 🫧 bubbles */
    .bubble {
      position: fixed;
      bottom: -40px;
      width: 10px;
      height: 10px;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      animation: floatUp linear infinite;
      pointer-events:none;
    }

    @keyframes floatUp {
      to {
        transform: translateY(-110vh);
        opacity: 0;
      }
    }

  </style>
</head>

<body>
  <div class="container">
    <header>
      <div class="logo">
        <a href="../index.html">HASI<span style="opacity:.9">NOVA</span> 💜</a>
      </div>

      <nav>
        <ul>
          <li><a href="../index.html">Home</a></li>
          <li><a href="../tech/techindex.html">Tech</a></li>
          <li><a href="poemsindex.html" class="active">Poems</a></li>
          <li><a href="../about.html">About</a></li>
          <li><a href="../guide.html">Guide</a></li>
        </ul>
      </nav>
    </header>

    <h2>Poems & Writings ✨</h2>

    <section id="postsSection">
      <div id="cards" class="cards"></div>
      <div id="notice" class="notice">Loading posts…</div>
    </section>
  </div>

  <!-- 🫧 bubbles -->
  <script>
    for (let i = 0; i < 15; i++) {
      const b = document.createElement("div");
      b.className = "bubble";
      b.style.left = Math.random() * 100 + "vw";
      b.style.animationDuration = (6 + Math.random() * 5) + "s";
      b.style.opacity = Math.random();
      document.body.appendChild(b);
    }
  </script>

  <!-- existing logic (unchanged) -->
  <script>
    const postsFile = "../assets/data/posts.json";
    const cards = document.getElementById("cards");
    const notice = document.getElementById("notice");

    notice.style.display = "block";

    fetch(postsFile)
      .then(res => res.json())
      .then(posts => {
        notice.style.display = "none";

        const poemPosts = posts.filter(p =>
          (p.category || "").toLowerCase().includes("poem")
        );

        if(poemPosts.length === 0){
          notice.style.display = "block";
          notice.textContent = "No poem posts yet.";
          return;
        }

        poemPosts.sort((a,b) => new Date(b.date) - new Date(a.date));

        poemPosts.forEach(post => {
          const href = "../" + post.link;
          const thumb = "../assets/images/" + post.thumbnail;

          let preview = post.excerpt || "";
          preview = preview.split(" ").slice(0, 22).join(" ") + "...";

          const el = document.createElement("article");
          el.className = "card";

          el.innerHTML = `
            <a href="${href}">
              <img class="thumb" src="${thumb}" alt="${post.title}">
            </a>
            <div class="card-body">
              <h3><a href="${href}">${post.title}</a></h3>
              <div class="excerpt">${preview}</div>
              <div class="meta">
                <div class="cat">${post.category}</div>
                <div class="date">${new Date(post.date).toLocaleDateString()}</div>
              </div>
            </div>
          `;

          cards.appendChild(el);
        });
      })
      .catch(() => {
        notice.style.display = "block";
        notice.textContent = "Couldn't load posts.json.";
      });
  </script>

</body>
</html>
