<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tech | Hasinova</title>

  <link rel="stylesheet" href="../assets/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-light: #f6f2ff;   /* lavender */
      --bg-mid: #efe9fb;     /* lilac */
      --bg-warm: #fff6fb;    /* pink tint */

      --text-main: #2d2d2d;
      --muted: #7a6f8a;
      --accent: #a084ca;
    }

    html,body { height:100%; margin:0; }

    body {
      font-family:"Poppins",system-ui;

      background:
        linear-gradient(rgba(0,0,0,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.03) 1px, transparent 1px),
        linear-gradient(180deg, var(--bg-light), var(--bg-mid), var(--bg-warm));

      background-size: 28px 28px, 28px 28px, cover;

      color:var(--text-main);
      min-height:100vh;
      padding:32px 20px;

      display:flex;
      flex-direction:column;
      align-items:center;
      overflow-x:hidden;
    }

    .container { width:100%; max-width:1100px; }

    header {
      display:flex;
      justify-content:space-between;
      align-items:center;
      margin-bottom:30px;
    }

    .logo a{
      text-decoration:none;
      color:#2d2d2d;
      font-weight:700;
      font-size:1.2rem;
    }

    nav a{
      color:var(--muted);
      margin-left:16px;
      text-decoration:none;
      font-weight:600;
    }

    nav a:hover,
    nav a.active {
      color:#2d2d2d;
    }

    /* 💻 title */
    .title-wrap {
      margin-bottom:26px;
    }

    h1 {
      margin:0;
      font-size:1.8rem;
      font-weight:600;
    }

    .subtitle {
      margin:6px 0 0;
      color:var(--muted);
      font-size:0.95rem;
    }

    /* ✨ cards grid */
    .cards {
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(260px,1fr));
      gap:24px;
      width:100%;
    }

    .card {
      background: rgba(255,255,255,0.75);
      border:1px solid rgba(0,0,0,0.05);
      border-radius:16px;
      overflow:hidden;

      box-shadow:0 10px 25px rgba(0,0,0,0.08);

      transition: transform .25s ease, box-shadow .25s ease;

      display:flex;
      flex-direction:column;
      min-height:260px;
    }

    .card:hover {
      transform:translateY(-8px);
      box-shadow:0 18px 40px rgba(160,132,202,0.25);
    }

    .thumb {
      width:100%;
      height:140px;
      object-fit:cover;
      filter: brightness(0.95);
    }

    .card-body {
      padding:16px;
      display:flex;
      flex-direction:column;
      gap:10px;
      flex:1;
    }

    .card h3 {
      margin:0;
      font-size:1.1rem;
    }

    .card h3 a {
      color:var(--text-main);
      text-decoration:none;
    }

    .card h3 a:hover {
      text-decoration:underline;
    }

    .excerpt {
      color:var(--muted);
      font-size:0.92rem;
      line-height:1.5;
      flex:1;
    }

    .meta {
      display:flex;
      justify-content:space-between;
      align-items:center;
      font-size:0.8rem;
      margin-top:12px;
    }

    .cat {
      padding:4px 10px;
      border-radius:20px;

      background: rgba(160,132,202,0.15);
      color:#6d5ba6;

      font-weight:500;
    }

    .date {
      color:var(--muted);
    }

    .notice {
      display:none;
      padding:20px;
      color:var(--muted);
      text-align:center;
    }

    /* ✨ subtle floating particles (tech vibe) */
    .particle {
      position:fixed;
      width:6px;
      height:6px;
      background: rgba(160,132,202,0.4);
      border-radius:50%;
      animation: float 10s linear infinite;
      pointer-events:none;
    }

    @keyframes float {
      from { transform: translateY(100vh); opacity:1; }
      to { transform: translateY(-10vh); opacity:0; }
    }

  </style>
</head>

<body>
  <div class="container">
    <header>
      <div class="logo">
        <a href="../index.html">HASI<span style="opacity:.9">NOVA</span> 💻💜</a>
      </div>

      <nav>
        <a href="../index.html">Home</a>
        <a href="techindex.html" class="active">Tech</a>
        <a href="../poems/poemsindex.html">Poems</a>
        <a href="../about.html">About</a>
        <a href="../contact.html">Contact</a>
      </nav>
    </header>

    <div class="title-wrap">
      <h1>Tech & Builds ✨</h1>
      <p class="subtitle">notes, experiments, and my coding journey</p>
    </div>

    <section id="postsSection">
      <div id="cards" class="cards"></div>
      <div id="notice" class="notice">Loading posts…</div>
    </section>
  </div>

  <!-- ✨ floating particles -->
  <script>
    for (let i = 0; i < 12; i++) {
      const p = document.createElement("div");
      p.className = "particle";
      p.style.left = Math.random() * 100 + "vw";
      p.style.animationDuration = (8 + Math.random() * 6) + "s";
      p.style.opacity = Math.random();
      document.body.appendChild(p);
    }
  </script>

  <!-- same logic -->
  <script>
    const postsFile = "../assets/data/posts.json";
    const cards = document.getElementById("cards");
    const notice = document.getElementById("notice");

    notice.style.display = "block";

    fetch(postsFile)
      .then(res => {
        if (!res.ok) throw new Error("posts.json missing");
        return res.json();
      })
      .then(posts => {
        notice.style.display = "none";

        const techPosts = posts.filter(p =>
          (p.category || "").toLowerCase().includes("tech")
        );

        if (techPosts.length === 0) {
          notice.style.display = "block";
          notice.textContent = "No tech posts yet.";
          return;
        }

        techPosts.sort((a,b) => new Date(b.date) - new Date(a.date));

        techPosts.forEach(post => {
          const href = "../" + post.link;
          const thumb = "../assets/images/" + post.thumbnail;

          let preview = post.excerpt || "";
          preview = preview.split(" ").slice(0, 22).join(" ") + "...";

          const el = document.createElement("article");
          el.className = "card";

          el.innerHTML = `
            <a href="${href}">
              <img class="thumb" src="${thumb}" alt="${post.title}">
            </a>
            <div class="card-body">
              <h3><a href="${href}">${post.title}</a></h3>
              <div class="excerpt">${preview}</div>
              <div class="meta">
                <div class="cat">${post.category}</div>
                <div class="date">${new Date(post.date).toLocaleDateString()}</div>
              </div>
            </div>
          `;

          cards.appendChild(el);
        });
      })
      .catch(() => {
        notice.style.display = "block";
        notice.textContent = "Couldn't load posts.json.";
      });
  </script>

</body>
</html>
